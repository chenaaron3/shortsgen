name: Deploy SST

on:
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage (see sst.dev — resources are namespaced per stage)
        required: true
        default: production
        type: string
  push:
    branches:
      - main

concurrency:
  group: sst-deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        env:
          SST_PASSPHRASE: ${{ secrets.SST_PASSPHRASE }}
        run: |
          STAGE="${{ github.event_name == 'workflow_dispatch' && inputs.stage || 'production' }}"
          pnpm exec sst deploy --stage "$STAGE"
