name: Deploy SST

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: sst-deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Actions
    env:
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ vars.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SST builds Python container Lambdas with `uv sync` on the runner
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SST reads .sst/artifacts/<Function>-src/Dockerfile before that folder exists on clean CI checkouts.
      - name: Prepare Python Lambda Docker context
        run: |
          set -euo pipefail
          for fn in ShortgenInitialProcessing ShortgenUpdateImagery ShortgenUpdateFeedback ShortgenFinalizeClip; do
            dest=".sst/artifacts/${fn}-src"
            rm -rf "$dest"
            mkdir -p "$dest"
            cp -a services/python-generator/. "$dest/"
            rm -rf "$dest/cache" "$dest/.venv" 2>/dev/null || true
          done

      - name: Deploy
        run: |
          STAGE="${{ vars.SST_STAGE || secrets.SST_STAGE }}"
          if [ -z "$STAGE" ]; then
            echo "::error::Set the Actions environment or repository variable SST_STAGE to the same value as .sst/stage (run: cat .sst/stage)."
            exit 1
          fi
          echo "Deploying stage: $STAGE"
          pnpm exec sst deploy --stage "$STAGE"
